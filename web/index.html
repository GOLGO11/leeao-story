<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>李敖故事</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">大李敖全集 6.0</p>
          <h1>李敖故事</h1>
        </div>
        <div class="stats" aria-label="数据统计">
          <span id="storyCount">0 条</span>
          <span id="totalChars">0 字</span>
        </div>
      </header>

      <section class="controls" aria-label="筛选">
        <label class="field">
          <span>搜索</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="标题、原文、来源" />
        </label>
        <label class="field">
          <span>书名</span>
          <select id="bookFilter"></select>
        </label>
        <label class="field">
          <span>来源</span>
          <select id="sourceFilter"></select>
        </label>
      </section>

      <section class="content">
        <aside class="listPane">
          <div class="listHeader">
            <span id="resultCount">0 条</span>
            <button id="clearButton" type="button">清除</button>
          </div>
          <div id="storyList" class="storyList"></div>
        </aside>

        <article id="storyDetail" class="detailPane"></article>
      </section>
    </main>

    <script src="./stories.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
